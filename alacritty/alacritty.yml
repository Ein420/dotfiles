selection:
  save_to_clipboard: true

live_config_reload: true

window:
  padding:
    x: 12
    y: 12
  opacity: 0.97
  class:
    instance: Alacritty
    general: Alacritty
  dynamic_title: true

cursor:
  style:
    shape: Block
    blinking: On
    blink_interval: 0.03

scrolling:
  history: 100000
  multiplier: 1

font:
  normal:
    family: Roboto Mono Nerd Font
    style: Regular
  bold:
    family: Roboto Mono Nerd Font
    style: Bold
  italic:
    family: Roboto Mono Nerd Font
    style: Italic
  bold_italic:
    family: Roboto Mono Nerd Font
    style: Bold Italic
  size: 10

theme: Eqie6
colors:
  name: Eqie6
  author: ""
  primary:
    background: "#111111"
    foreground: "#cccccc"
  cursor:
    text: "#111111"
    cursor: "#cccccc"
  normal:
    black: "#222222"
    red: "#e84f4f"
    green: "#b7ce42"
    yellow: "#fea63c"
    blue: "#66a9b9"
    magenta: "#b7416e"
    cyan: "#6d878d"
    white: "#cccccc"
  bright:
    black: "#666666"
    red: "#d23d3d"
    green: "#bde077"
    yellow: "#ffe863"
    blue: "#aaccbb"
    magenta: "#e16a98"
    cyan: "#42717b"
    white: "#ffffff"
